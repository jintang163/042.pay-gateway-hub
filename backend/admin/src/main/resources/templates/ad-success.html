<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>支付成功</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(180deg, #f6ffed 0%, #ffffff 40%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    .success-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(82, 196, 26, 0.12);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .success-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #52c41a, #73d13d, #95de64);
    }
    .success-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #52c41a, #389e0d);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      box-shadow: 0 8px 24px rgba(82, 196, 26, 0.35);
      animation: popIn .5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .success-subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }
    .success-amount {
      font-size: 36px;
      font-weight: 700;
      color: #52c41a;
      margin: 16px 0;
    }
    .success-amount .symbol { font-size: 20px; }
    .order-info {
      background: #fafafa;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: left;
      font-size: 13px;
      color: #666;
      margin-top: 16px;
    }
    .order-info .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }
    .order-info .label { color: #999; }
    .order-info .value { color: #333; word-break: break-all; max-width: 60%; }

    .ad-section {
      background: #fff;
      border-radius: 16px;
      padding: 20px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .ad-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .ad-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ad-tag {
      font-size: 11px;
      padding: 2px 6px;
      background: #fff7e6;
      color: #d46b08;
      border-radius: 4px;
      font-weight: normal;
    }
    .ad-more {
      font-size: 12px;
      color: #999;
    }
    .ad-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ad-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #fafafa;
      text-decoration: none;
      color: inherit;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .ad-item:active { transform: scale(0.98); background: #f0f0f0; }
    .ad-item.has-image { padding: 0; }
    .ad-item .ad-image-wrapper {
      width: 100%;
      height: 140px;
      overflow: hidden;
    }
    .ad-item .ad-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .ad-icon {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: linear-gradient(135deg, #e6f7ff, #bae7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .ad-content {
      flex: 1;
      min-width: 0;
    }
    .ad-item-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }
    .ad-item-desc {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .ad-item-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #bfbfbf;
    }
    .ad-cpc {
      padding: 2px 6px;
      background: #fff7e6;
      color: #d46b08;
      border-radius: 4px;
    }
    .ad-arrow {
      color: #ccc;
      font-size: 16px;
      align-self: center;
    }
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #bfbfbf;
      font-size: 13px;
    }
    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 10px;
      opacity: 0.5;
    }
    .bottom-actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #52c41a, #389e0d);
      color: #fff;
      box-shadow: 0 4px 12px rgba(82, 196, 26, 0.3);
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #666;
    }
    .btn:active { transform: translateY(1px); }
    .footer-tip {
      text-align: center;
      font-size: 11px;
      color: #ccc;
      margin-top: 24px;
      padding-bottom: 20px;
    }
    .footer-tip a { color: #bfbfbf; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <div class="success-title">支付成功</div>
      <div class="success-subtitle">感谢您的购买</div>
      <div class="success-amount">
        <span class="symbol">¥</span><span th:text="${payAmount}">0.00</span>
      </div>
      <div class="order-info" th:if="${orderNo != null and !orderNo.isEmpty()">
        <div class="row">
          <span class="label">订单号</span>
          <span class="value" th:text="${orderNo}">-</span>
        </div>
      </div>
    </div>

    <div class="ad-section">
      <div class="ad-header">
        <span class="ad-title">
          为您推荐 <span class="ad-tag">广告</span>
        </span>
        <span class="ad-more">精选好物</span>
      </div>

      <div class="ad-list" th:if="${ads != null and !ads.isEmpty()">
        <a class="ad-item" th:each="ad : ${ads}"
           th:href="@{/ad/click/redirect(adCode=${ad.adCode}, merchantNo=${merchantNo}, orderNo=${orderNo}, position=${position}, payAmount=${payAmount})}"
           target="_blank"
           th:onclick="'recordAdClick(\'' + ${ad.adCode} + '\');'">
          <div class="ad-icon" th:if="${ad.adImageUrl == null or ad.adImageUrl.isEmpty()}">
            <span>📦</span>
          </div>
          <div class="ad-content" th:if="${ad.adImageUrl == null or ad.adImageUrl.isEmpty()}">
            <div class="ad-item-title" th:text="${ad.adTitle}">广告标题</div>
            <div class="ad-item-desc" th:text="${ad.adDescription}">广告描述文字</div>
            <div class="ad-item-meta">
              <span class="ad-cpc" th:if="${ad.cpcPrice != null and ad.cpcPrice.compareTo(T(java.math.BigDecimal).ZERO) > 0">
                赞助
              </span>
              <span>点击查看详情</span>
            </div>
          </div>
          <div class="ad-arrow" th:if="${ad.adImageUrl == null or ad.adImageUrl.isEmpty()}">›</div>
        </a>
        <div class="ad-item has-image" th:each="ad : ${ads}" th:if="${ad.adImageUrl != null and !ad.adImageUrl.isEmpty()}"
           th:href="@{/ad/click/redirect(adCode=${ad.adCode}, merchantNo=${merchantNo}, orderNo=${orderNo}, position=${position}, payAmount=${payAmount})}"
           target="_blank">
          <div class="ad-image-wrapper">
            <img th:src="${ad.adImageUrl}" alt="ad"/>
          </div>
        </div>
      </div>

      <div class="empty-state" th:if="${ads == null or ads.isEmpty()}">
        <div class="empty-icon">🎯</div>
        <div>暂无推荐内容</div>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="btn btn-secondary" onclick="goBack()">返回首页</button>
      <button class="btn btn-primary" onclick="continuePay()">再付一笔</button>
    </div>

    <div class="footer-tip">
      <a href="#" onclick="window.close(); return false;">关闭页面</a>
    </div>
  </div>

<script>
  function recordAdClick(adCode) {
    try {
      var img = new Image();
      img.src = '/api/ad/click?adCode=' + encodeURIComponent(adCode);
    } catch(e) {}
  }
  function goBack() {
    if (window.history.length > 1) {
      window.history.back();
    } else {
      window.close();
    }
  }
  function continuePay() {
    window.location.href = window.location.origin + '/cashier';
  }
</script>
</body>
</html>
