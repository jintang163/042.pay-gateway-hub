<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>支付出错</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #ff7875 0%, #cf1322 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      color: #333;
      border-radius: 16px;
      padding: 40px 24px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      text-align: center;
    }
    .icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: #fff1f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: #cf1322;
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 12px; }
    .msg {
      background: #fff7e6;
      border: 1px solid #ffd591;
      color: #d46b08;
      font-size: 14px;
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.6;
      margin: 16px 0 24px;
      word-break: break-all;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .btn {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #1677ff; color: #fff; }
    .btn-ghost { background: #f0f0f0; color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">!</div>
    <h1>支付遇到问题</h1>
    <div class="msg" th:text="${errorMsg} ?: '未知错误'">未知错误</div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="history.back()">返回</button>
      <button class="btn btn-primary" onclick="location.reload()">重新尝试</button>
    </div>
  </div>
</body>
</html>
