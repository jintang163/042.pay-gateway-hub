<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>聚合支付</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      background: linear-gradient(135deg, #07c160, #1677ff, #e60012);
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #999; margin-bottom: 20px; }
    .amount { font-size: 40px; font-weight: 700; color: #1677ff; margin-bottom: 4px; }
    .amount-label { color: #999; font-size: 13px; margin-bottom: 24px; }
    .tip {
      background: #f0f5ff;
      border-radius: 10px;
      padding: 14px 12px;
      font-size: 13px;
      color: #1d39c4;
      margin-bottom: 20px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1677ff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn:active { opacity: 0.8; }
    .order-info {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px dashed #eee;
      text-align: left;
      font-size: 12px;
      color: #999;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">¥</div>
    <h1>聚合支付</h1>
    <p class="sub">支持 微信 / 支付宝 / 云闪付</p>
    <div class="amount" th:text="'¥' + ${amount}">¥0.00</div>
    <div class="amount-label">支付金额</div>
    <div class="tip">请使用微信、支付宝或云闪付 APP 扫描二维码完成支付</div>
    <button class="btn" onclick="var sel = document.createElement('a');sel.href=location.pathname + '/select';location.href = sel.href;">选择其他支付方式</button>
    <div class="order-info">
      <div>订单号：<span th:text="${orderNo}">-</span></div>
      <div>安全加密：TLS 1.3 / HTTPS</div>
    </div>
  </div>
<script th:inline="javascript">
  var orderNo = /*[[${orderNo}]]*/ '';
  var channel = /*[[${channel}]]*/ '';
  if (channel && location.search.indexOf('channel') === -1) {
    setTimeout(function() { location.href = location.pathname + '?channel=' + channel; }, 100);
  }
</script>
</body>
</html>
