<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>商户收银台</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #1677ff, #0958d9);
      color: #fff;
      padding: 28px 24px;
      text-align: center;
    }
    .card-header h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .card-header .sub { font-size: 13px; opacity: 0.85; }
    .merchant-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.9;
    }
    .merchant-info .dot {
      width: 6px; height: 6px;
      background: #52c41a;
      border-radius: 50%;
    }
    .login-tip {
      background: #fff7e6;
      color: #d46b08;
      padding: 10px 14px;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    .login-tip.show { display: block; }
    .card-body { padding: 28px 24px; }
    .amount-section { text-align: center; margin-bottom: 28px; }
    .amount-label { font-size: 13px; color: #999; margin-bottom: 8px; }
    .amount-input-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .currency { font-size: 32px; color: #1677ff; font-weight: 600; }
    .amount-input {
      font-size: 48px;
      font-weight: 700;
      color: #1a1a1a;
      border: none;
      outline: none;
      width: 200px;
      text-align: center;
      background: transparent;
    }
    .amount-input:focus { border-bottom: 2px solid #1677ff; }
    .product-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 16px;
      outline: none;
      transition: border-color .2s;
    }
    .product-input:focus { border-color: #1677ff; }

    .pay-tabs {
      display: flex;
      background: #f5f6fa;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .pay-tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-size: 14px;
      color: #666;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }
    .pay-tab.active {
      background: #fff;
      color: #1677ff;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .pay-tab .icon { font-size: 20px; display: block; margin-bottom: 4px; }

    .channel-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .channel-option {
      padding: 14px 8px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .channel-option:hover { border-color: #91caff; }
    .channel-option.active {
      border-color: #1677ff;
      background: #e6f4ff;
    }
    .channel-option .ch-icon { font-size: 24px; display: block; margin-bottom: 4px; }
    .channel-option .ch-name { font-size: 12px; color: #333; }
    .channel-option.active .ch-name { color: #1677ff; font-weight: 600; }

    .barcode-section { display: none; }
    .barcode-section.active { display: block; }
    .scan-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .scan-toggle .mini-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #333;
    }
    .scan-toggle .mini-btn.active {
      background: #1677ff;
      color: #fff;
      border-color: #1677ff;
    }
    #reader {
      width: 100%;
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }
    #reader.active { display: block; }
    .barcode-input-wrapper {
      position: relative;
      margin-bottom: 16px;
    }
    .barcode-input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 16px;
      letter-spacing: 2px;
      outline: none;
      transition: border-color .2s;
      font-family: "Courier New", monospace;
    }
    .barcode-input:focus { border-color: #1677ff; }
    .barcode-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
    }
    .barcode-hint {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .facepay-section { display: none; text-align: center; }
    .facepay-section.active { display: block; }
    .face-sdk-container {
      width: 100%;
      height: 240px;
      margin-bottom: 16px;
      border-radius: 12px;
      background: #f5f6fa;
      overflow: hidden;
      position: relative;
    }
    #facepay-container {
      width: 100%;
      height: 100%;
    }
    .face-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #999;
    }
    .face-fallback-icon { font-size: 72px; }
    .face-fallback-text { font-size: 13px; line-height: 1.6; }
    .facepay-hint {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .face-sdk-status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 10px;
    }
    .face-sdk-status.ready { background: #f6ffed; color: #52c41a; }
    .face-sdk-status.loading { background: #e6f4ff; color: #1677ff; }
    .face-sdk-status.error { background: #fff1f0; color: #ff4d4f; }

    .action-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .action-btn.primary {
      background: linear-gradient(135deg, #1677ff, #0958d9);
      color: #fff;
      box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
    }
    .action-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(22, 119, 255, 0.4); }
    .action-btn.primary:active { transform: translateY(0); }
    .action-btn.primary:disabled {
      background: #bfbfbf;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .action-btn.secondary {
      background: #f5f6fa;
      color: #333;
      margin-top: 10px;
    }
    .action-btn.secondary:hover { background: #e8e8e8; }

    .result-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .result-modal.show { display: flex; }
    .result-content {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      animation: popIn .3s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .result-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
    }
    .result-icon.success { background: #f6ffed; color: #52c41a; }
    .result-icon.paying { background: #e6f4ff; color: #1677ff; }
    .result-icon.fail { background: #fff1f0; color: #ff4d4f; }
    .result-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .result-desc { font-size: 14px; color: #666; margin-bottom: 16px; line-height: 1.6; }
    .result-amount {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 16px 0;
    }
    .result-detail {
      background: #fafafa;
      border-radius: 10px;
      padding: 14px;
      text-align: left;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .result-detail .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }
    .result-detail .label { color: #999; }
    .result-detail .value { color: #333; word-break: break-all; max-width: 60%; }
    .result-ad {
      margin-top: 12px;
      text-align: left;
    }
    .result-ad-label {
      font-size: 11px;
      color: #d46b08;
      background: #fff7e6;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .result-ad-link {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: linear-gradient(135deg, #fffbe6, #fff1b8);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      align-items: center;
    }
    .result-ad-link:active { transform: scale(0.99); }
    .result-ad-icon {
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .result-ad-text { flex: 1; min-width: 0; }
    .result-ad-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-ad-desc {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-ad-arrow { color: #bfbfbf; font-size: 14px; }
    .result-ad-empty {
      font-size: 12px; color: #bfbfbf; padding: 8px 0; text-align: center;
    }

    .qrcode-section { display: none; text-align: center; }
    .qrcode-section.active { display: block; }
    .qrcode-box {
      width: 200px;
      height: 200px;
      margin: 0 auto 16px;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    .qrcode-box img { width: 100%; height: 100%; }
    .qrcode-empty {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: #999; font-size: 13px;
    }
    .qrcode-hint {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }
    .qrcode-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }
    .qrcode-actions .mini-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #333;
    }
    .qrcode-actions .mini-btn:hover { border-color: #1677ff; color: #1677ff; }

    .loading-bar {
      width: 100%;
      height: 3px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
      display: none;
    }
    .loading-bar.active { display: block; }
    .loading-bar::after {
      content: '';
      display: block;
      width: 30%;
      height: 100%;
      background: #1677ff;
      border-radius: 2px;
      animation: loading 1s ease-in-out infinite;
    }
    @keyframes loading {
      0% { margin-left: -30%; }
      100% { margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1>商户收银台</h1>
        <p class="sub">安全便捷 · 多种支付方式</p>
        <div class="merchant-info">
          <span class="dot"></span>
          <span>商户号：<span id="merchantNoLabel" th:text="${merchantNo}">-</span></span>
        </div>
      </div>
      <div class="login-tip" id="loginTip">未获取到登录态，请先登录商户后台</div>

      <div class="card-body">
        <div class="amount-section">
          <div class="amount-label">收款金额</div>
          <div class="amount-input-group">
            <span class="currency">¥</span>
            <input type="number" class="amount-input" id="amountInput" placeholder="0.00" step="0.01" min="0.01"/>
          </div>
          <input type="text" class="product-input" id="productInput" placeholder="商品描述（选填）" value="商品购买"/>
        </div>

        <div class="pay-tabs">
          <div class="pay-tab active" onclick="switchPayMode('barcode')">
            <span class="icon">📷</span>扫码收款
          </div>
          <div class="pay-tab" onclick="switchPayMode('qrcode')">
            <span class="icon">📱</span>用户扫码
          </div>
          <div class="pay-tab" onclick="switchPayMode('facepay')">
            <span class="icon">😊</span>刷脸支付
          </div>
        </div>

        <div class="channel-options" id="channelOptions">
          <div class="channel-option active" data-channel="WECHAT_PAY" onclick="selectChannel(this)">
            <span class="ch-icon">💚</span>
            <span class="ch-name">微信支付</span>
          </div>
          <div class="channel-option" data-channel="ALIPAY" onclick="selectChannel(this)">
            <span class="ch-icon">💙</span>
            <span class="ch-name">支付宝</span>
          </div>
          <div class="channel-option" data-channel="UNION_PAY" onclick="selectChannel(this)">
            <span class="ch-icon">♥️</span>
            <span class="ch-name">云闪付</span>
          </div>
        </div>

        <div class="barcode-section active" id="barcodeSection">
          <div class="scan-toggle">
            <button class="mini-btn active" id="scanCamBtn" onclick="toggleScanMode('camera')">📷 摄像头扫码</button>
            <button class="mini-btn" id="scanGunBtn" onclick="toggleScanMode('manual')">⌨️ 扫码枪/手输</button>
          </div>
          <div id="reader"></div>
          <div class="barcode-input-wrapper" id="manualWrapper" style="display:none;">
            <span class="barcode-icon">⌗</span>
            <input type="text" class="barcode-input" id="authCodeInput"
                   placeholder="请扫描或输入付款码" maxlength="32" autocomplete="off"/>
          </div>
          <div class="barcode-hint">
            <span id="barcodeHint">请允许摄像头权限，将用户付款码对准扫描框</span>
          </div>
          <div class="loading-bar" id="barcodeLoading"></div>
          <button class="action-btn primary" id="barcodeBtn" onclick="submitBarcodePay()" disabled>等待获取付款码...</button>
        </div>

        <div class="qrcode-section" id="qrcodeSection">
          <div class="qrcode-box" id="qrcodeBox">
            <div class="qrcode-empty">点击生成收款码</div>
          </div>
          <div class="qrcode-hint">用户打开微信/支付宝扫描二维码完成支付</div>
          <div class="loading-bar" id="qrLoading"></div>
          <button class="action-btn primary" id="qrBtn" onclick="generateQrCode()">生成收款码</button>
          <div class="qrcode-actions">
            <button class="mini-btn" onclick="refreshQrCode()">刷新二维码</button>
            <button class="mini-btn" onclick="queryQrOrder()">查询订单</button>
          </div>
        </div>

        <div class="facepay-section" id="facepaySection">
          <div class="face-sdk-container">
            <div id="facepay-container">
              <div class="face-fallback" id="faceFallback">
                <div class="face-fallback-icon">😊</div>
                <div class="face-fallback-text" id="faceSdkHint">刷脸SDK加载中...</div>
              </div>
            </div>
          </div>
          <div><span class="face-sdk-status loading" id="faceSdkStatus">SDK初始化中</span></div>
          <div class="facepay-hint">
            请将面部对准摄像头<br/>
            点击「开始刷脸支付」发起识别
          </div>
          <input type="text" class="product-input" id="openIdInput" placeholder="用户OpenID（调试用，可留空）" style="margin-bottom:16px;"/>
          <div class="loading-bar" id="faceLoading"></div>
          <button class="action-btn primary" id="facepayBtn" onclick="startFacePay()">开始刷脸支付</button>
        </div>
      </div>
    </div>
  </div>

  <div class="result-modal" id="resultModal">
    <div class="result-content">
      <div class="result-icon" id="resultIcon">✓</div>
      <div class="result-title" id="resultTitle">支付成功</div>
      <div class="result-desc" id="resultDesc">感谢您的使用</div>
      <div class="result-amount" id="resultAmount">¥0.00</div>
      <div class="result-detail" id="resultDetail" style="display:none;"></div>
      <div class="result-ad" id="resultAd" style="display:none;">
        <span class="result-ad-label">广告</span>
        <div id="resultAdInner"></div>
      </div>
      <button class="action-btn primary" onclick="closeModal()" id="resultPrimaryBtn">确认</button>
      <button class="action-btn secondary" id="continueBtn" onclick="resetForm()">继续收款</button>
    </div>
  </div>

<script>
  var merchantNo = /*[[${merchantNo}]]*/ null;
  var currentChannel = 'WECHAT_PAY';
  var currentOrderNo = '';
  var pollingTimer = null;
  var html5QrCode = null;
  var scanMode = 'camera';
  var lastScanCode = '';
  var scanCooldown = 0;
  var wxFacepaySdk = null;
  var aliFacepaySdk = null;
  var facepaySdkReady = false;
  var currentFaceCode = '';
  var cashApiBase = '/api/cashier';

  function getToken() {
    var t = localStorage.getItem('token') || sessionStorage.getItem('token');
    if (t && t.indexOf('Bearer ') !== 0) t = 'Bearer ' + t;
    return t || null;
  }

  function cashFetch(url, options) {
    options = options || {};
    options.headers = options.headers || {};
    var token = getToken();
    if (token) options.headers['Authorization'] = token;
    options.headers['Content-Type'] = 'application/json';
    return fetch(url, options).then(function(r) { return r.json(); });
  }

  function randomString(len) {
    var chars = 'ABCDEFGHJKMNPQRSTWXYZabcdefhijkmnprstwxyz2345678';
    var s = '';
    for (var i = 0; i < len; i++) s += chars.charAt(Math.floor(Math.random() * chars.length));
    return s;
  }

  function genOrderNo() {
    var t = new Date().getTime();
    var r = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
    return 'CB' + t + r;
  }

  function initCashier() {
    if (!merchantNo) {
      var saved = localStorage.getItem('merchantNo');
      if (saved) { merchantNo = saved; document.getElementById('merchantNoLabel').textContent = merchantNo; }
    }
    cashFetch(cashApiBase + '/init').then(function(res) {
      if (res.code === 200 && res.data) {
        merchantNo = res.data.merchantNo;
        document.getElementById('merchantNoLabel').textContent = merchantNo;
        localStorage.setItem('merchantNo', merchantNo);
        document.getElementById('loginTip').classList.remove('show');
      } else {
        document.getElementById('loginTip').classList.add('show');
      }
    }).catch(function() {
      document.getElementById('loginTip').classList.add('show');
    });
  }

  function selectChannel(el) {
    document.querySelectorAll('.channel-option').forEach(function(opt) {
      opt.classList.remove('active');
    });
    el.classList.add('active');
    currentChannel = el.getAttribute('data-channel');
    if (currentPayMode === 'facepay') {
      initFacepaySdk();
    }
  }

  var currentPayMode = 'barcode';
  function switchPayMode(mode) {
    currentPayMode = mode;
    document.querySelectorAll('.pay-tab').forEach(function(tab, idx) {
      tab.classList.toggle('active', (mode === 'barcode' && idx === 0) ||
        (mode === 'qrcode' && idx === 1) || (mode === 'facepay' && idx === 2));
    });
    document.getElementById('barcodeSection').classList.toggle('active', mode === 'barcode');
    document.getElementById('qrcodeSection').classList.toggle('active', mode === 'qrcode');
    document.getElementById('facepaySection').classList.toggle('active', mode === 'facepay');
    if (mode === 'barcode') {
      toggleScanMode(scanMode);
    } else {
      stopScanner();
    }
    if (mode === 'facepay') {
      initFacepaySdk();
    }
  }

  function toggleScanMode(mode) {
    scanMode = mode;
    document.getElementById('scanCamBtn').classList.toggle('active', mode === 'camera');
    document.getElementById('scanGunBtn').classList.toggle('active', mode === 'manual');
    document.getElementById('reader').classList.toggle('active', mode === 'camera');
    document.getElementById('manualWrapper').style.display = mode === 'manual' ? 'block' : 'none';
    document.getElementById('barcodeHint').textContent = mode === 'camera'
      ? '请允许摄像头权限，将用户付款码对准扫描框'
      : '请将扫码枪对准用户付款码，或手动输入后按回车';
    var btn = document.getElementById('barcodeBtn');
    if (mode === 'camera') {
      btn.textContent = '等待扫描付款码...';
      btn.disabled = true;
      startScanner();
    } else {
      btn.textContent = '确认收款';
      btn.disabled = false;
      stopScanner();
    }
  }

  function startScanner() {
    if (!window.Html5Qrcode) {
      document.getElementById('barcodeHint').textContent = '扫码组件未加载，请切换到扫码枪/手输模式';
      toggleScanMode('manual');
      return;
    }
    stopScanner();
    html5QrCode = new Html5Qrcode("reader");
    var config = { fps: 10, qrbox: { width: 300, height: 150 }, aspectRatio: 2.0 };
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
      .catch(function(err) {
        console.error('启动摄像头失败:', err);
        document.getElementById('barcodeHint').textContent = '无法启动摄像头: ' + (err.message || err) + '，请切换到扫码枪模式';
        toggleScanMode('manual');
      });
  }

  function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
      html5QrCode.stop().then(function() {
        html5QrCode.clear();
      }).catch(function() {});
    }
  }

  function onScanSuccess(decodedText) {
    var now = Date.now();
    if (now - scanCooldown < 1500) return;
    if (decodedText === lastScanCode && now - scanCooldown < 3000) return;
    scanCooldown = now;
    lastScanCode = decodedText;
    var cleanCode = decodedText.trim().replace(/[\s\n\r]/g, '');
    if (!cleanCode) return;
    document.getElementById('authCodeInput').value = cleanCode;
    var btn = document.getElementById('barcodeBtn');
    btn.disabled = false;
    btn.textContent = '已获取付款码: ' + cleanCode.slice(0, 4) + '****' + cleanCode.slice(-4);
    if (cleanCode.length >= 10) {
      setTimeout(function() { submitBarcodePay(); }, 300);
    }
  }

  function onScanFailure() {
  }

  function getAmount() {
    var v = parseFloat(document.getElementById('amountInput').value);
    if (!v || v <= 0) { alert('请输入有效金额'); return null; }
    return v.toFixed(2);
  }

  function getProduct() {
    return document.getElementById('productInput').value || '商品购买';
  }

  function submitBarcodePay() {
    var amount = getAmount(); if (!amount) return;
    var authCode = document.getElementById('authCodeInput').value.trim();
    if (!authCode) { alert('请扫描或输入付款码'); return; }

    var orderNo = genOrderNo();
    var btn = document.getElementById('barcodeBtn');
    btn.disabled = true; btn.textContent = '支付处理中...';
    document.getElementById('barcodeLoading').classList.add('active');

    cashFetch(cashApiBase + '/barcode', {
      method: 'POST',
      body: JSON.stringify({
        merchantOrderNo: orderNo,
        payAmount: parseFloat(amount),
        payChannel: currentChannel,
        authCode: authCode,
        productSubject: getProduct()
      })
    })
    .then(function(res) {
      if (res.code === 200 && res.data) {
        currentOrderNo = res.data.orderNo;
        handleBarcodeResult(res.data, amount);
      } else {
        showResult('fail', '支付失败', res.message || '未知错误', amount);
      }
    })
    .catch(function(e) {
      showResult('fail', '请求异常', e.message || '网络错误', amount);
    })
    .finally(function() {
      btn.disabled = false; btn.textContent = '确认收款';
      document.getElementById('barcodeLoading').classList.remove('active');
      document.getElementById('authCodeInput').value = '';
      lastScanCode = '';
    });
  }

  function handleBarcodeResult(data, amount) {
    amount = data.payAmount || amount;
    if (data.isSuccess || data.payStatus === 1 || 'SUCCESS' === data.payStatus) {
      showResult('success', '支付成功', '收款已到账', amount, {
        '订单号': data.orderNo,
        '交易号': data.channelTradeNo || '-',
        '付款方': data.buyerLogonId || data.buyerUserId || '-'
      });
    } else if (data.isPaying || 'PAYING' === data.payStatus || 'PENDING' === data.payStatus) {
      showResult('paying', '用户支付中', data.subMsg || '用户正在输入密码，请稍后查询订单状态', amount, {
        '订单号': data.orderNo
      });
      startPolling(data.orderNo, 'barcode');
    } else {
      showResult('fail', '支付失败', data.subMsg || data.msg || data.message || '付款码无效或已过期', amount);
    }
  }

  function initFacepaySdk() {
    if (facepaySdkReady) return;
    setFaceStatus('loading', 'SDK初始化中');
    if (currentChannel === 'WECHAT_PAY') {
      loadWxFacepaySdk();
    } else if (currentChannel === 'ALIPAY') {
      loadAliFacepaySdk();
    } else {
      setFaceStatus('error', '当前渠道暂不支持刷脸');
      document.getElementById('faceSdkHint').textContent = '请选择微信或支付宝刷脸';
    }
  }

  function setFaceStatus(type, text) {
    var el = document.getElementById('faceSdkStatus');
    el.className = 'face-sdk-status ' + type;
    el.textContent = text;
  }

  function loadWxFacepaySdk() {
    if (document.getElementById('wx-facepay-script')) { return; }
    var s = document.createElement('script');
    s.id = 'wx-facepay-script';
    s.src = 'https://wx.gtimg.com/wxpayface/wxpayface-1.3.0.js';
    s.onerror = function() {
      setFaceStatus('error', '微信SDK加载失败');
      document.getElementById('faceSdkHint').textContent = '微信刷脸SDK加载失败，将使用模拟模式';
      facepaySdkReady = true;
    };
    s.onload = function() {
      if (window.WxPayFace) {
        try {
          WxPayFace.init({
            appid: '',
            mch_id: merchantNo || '',
            sub_appid: '',
            sub_mch_id: '',
            store_id: '0001',
            store_name: '收银台'
          });
          wxFacepaySdk = WxPayFace;
          setFaceStatus('ready', '微信刷脸SDK已就绪');
          document.getElementById('faceSdkHint').innerHTML = '✅ 微信刷脸SDK已就绪<br/>点击按钮开始识别';
          facepaySdkReady = true;
        } catch(e) {
          setFaceStatus('error', '微信SDK初始化失败');
          document.getElementById('faceSdkHint').textContent = '微信SDK初始化失败：' + e.message;
          facepaySdkReady = true;
        }
      } else {
        setFaceStatus('ready', '兼容模式（仅预览）');
        document.getElementById('faceSdkHint').innerHTML = '⚠️ 运行环境不支持微信原生刷脸<br/>请在微信刷脸设备上使用，或使用OpenID调试';
        facepaySdkReady = true;
      }
    };
    document.head.appendChild(s);
  }

  function loadAliFacepaySdk() {
    if (document.getElementById('ali-facepay-script')) { return; }
    setFaceStatus('loading', '支付宝SDK加载中');
    var s = document.createElement('script');
    s.id = 'ali-facepay-script';
    s.src = 'https://gw.alipayobjects.com/as/g/facepay/facepayjs/1.0.0/facepay.min.js';
    s.onerror = function() {
      setFaceStatus('error', '支付宝SDK加载失败');
      document.getElementById('faceSdkHint').textContent = '支付宝刷脸SDK加载失败，将使用模拟模式';
      facepaySdkReady = true;
    };
    s.onload = function() {
      if (window.alipay && window.alipay.facepay) {
        aliFacepaySdk = window.alipay.facepay;
        setFaceStatus('ready', '支付宝刷脸SDK已就绪');
        document.getElementById('faceSdkHint').innerHTML = '✅ 支付宝刷脸SDK已就绪<br/>点击按钮开始识别';
        facepaySdkReady = true;
      } else {
        setFaceStatus('ready', '兼容模式（仅预览）');
        document.getElementById('faceSdkHint').innerHTML = '⚠️ 运行环境不支持支付宝原生刷脸<br/>请在支付宝刷脸设备上使用，或使用OpenID调试';
        facepaySdkReady = true;
      }
    };
    document.head.appendChild(s);
  }

  function startFacePay() {
    var amount = getAmount(); if (!amount) return;
    var btn = document.getElementById('facepayBtn');
    btn.disabled = true; btn.textContent = '识别中...';
    document.getElementById('faceLoading').classList.add('active');

    if (currentChannel === 'WECHAT_PAY' && wxFacepaySdk) {
      try {
        WxPayFace.getWxpayfaceCode({
          appid: '',
          mch_id: merchantNo || '',
          store_id: '0001',
          telephonenumber: '',
          openid: '',
          ask_face_permit: '1',
          face_code_type: '1',
          out_trade_no: genOrderNo(),
          total_fee: Math.round(parseFloat(amount) * 100),
          success: function(res) {
            currentFaceCode = res.wxpayface_code || res.face_code || '';
            currentOpenId = res.openid || '';
            submitFacePay(amount, currentFaceCode, currentOpenId);
          },
          error: function(err) {
            console.error('微信刷脸失败:', err);
            document.getElementById('faceLoading').classList.remove('active');
            btn.disabled = false; btn.textContent = '开始刷脸支付';
            alert('刷脸识别失败：' + (err.msg || err.err_msg || JSON.stringify(err)));
          }
        });
        return;
      } catch (e) {
        console.warn('原生微信刷脸调用失败，使用调试模式:', e);
      }
    }

    if (currentChannel === 'ALIPAY' && aliFacepaySdk) {
      try {
        aliFacepaySdk.startFacePay({
          amount: Math.round(parseFloat(amount) * 100),
          timeout: 15,
          success: function(res) {
            currentFaceCode = res.ftoken || res.face_code || '';
            currentOpenId = res.user_id || res.alipay_user_id || '';
            submitFacePay(amount, currentFaceCode, currentOpenId);
          },
          error: function(err) {
            console.error('支付宝刷脸失败:', err);
            document.getElementById('faceLoading').classList.remove('active');
            btn.disabled = false; btn.textContent = '开始刷脸支付';
            alert('刷脸识别失败：' + (err.msg || JSON.stringify(err)));
          }
        });
        return;
      } catch (e) {
        console.warn('原生支付宝刷脸调用失败，使用调试模式:', e);
      }
    }

    var debugOpenId = document.getElementById('openIdInput').value.trim();
    if (debugOpenId) {
      submitFacePay(amount, 'FACE' + Date.now().toString().slice(-8), debugOpenId);
    } else {
      document.getElementById('faceLoading').classList.remove('active');
      btn.disabled = false; btn.textContent = '开始刷脸支付';
      alert('当前环境不支持原生刷脸SDK，请在刷脸设备上运行，或在输入框填写用户OpenID调试');
    }
  }

  function submitFacePay(amount, faceCode, openId) {
    var orderNo = genOrderNo();
    cashFetch(cashApiBase + '/facepay', {
      method: 'POST',
      body: JSON.stringify({
        merchantOrderNo: orderNo,
        payAmount: parseFloat(amount),
        payChannel: currentChannel,
        faceCode: faceCode || '',
        openId: openId || '',
        productSubject: getProduct()
      })
    })
    .then(function(res) {
      if (res.code === 200 && res.data) {
        currentOrderNo = res.data.orderNo;
        handleFaceResult(res.data, amount);
      } else {
        showResult('fail', '支付失败', res.message || '未知错误', amount);
      }
    })
    .catch(function(e) {
      showResult('fail', '请求异常', e.message || '网络错误', amount);
    })
    .finally(function() {
      var btn = document.getElementById('facepayBtn');
      btn.disabled = false; btn.textContent = '开始刷脸支付';
      document.getElementById('faceLoading').classList.remove('active');
    });
  }

  function handleFaceResult(data, amount) {
    amount = data.payAmount || amount;
    if (data.isSuccess || data.payStatus === 1 || 'SUCCESS' === data.payStatus) {
      showResult('success', '刷脸成功', '支付已完成', amount, {
        '订单号': data.orderNo,
        '交易号': data.channelTradeNo || '-',
        '用户': data.buyerLogonId || data.openId || '-'
      });
    } else if (data.isNeedAuth || 'NEED_AUTH' === data.payStatus) {
      showResult('paying', '需要再次验证', data.subMsg || '请再次刷脸确认支付', amount, {
        '订单号': data.orderNo,
        '验证Token': data.faceAuthToken || '-'
      });
    } else if (data.isPaying || 'PAYING' === data.payStatus || 'PENDING' === data.payStatus) {
      showResult('paying', '确认中', data.subMsg || '请在手机上确认支付', amount, {
        '订单号': data.orderNo
      });
      startPolling(data.orderNo, 'facepay');
    } else {
      showResult('fail', '支付失败', data.subMsg || data.msg || data.message || '人脸识别未通过', amount);
    }
  }

  function generateQrCode() {
    var amount = getAmount(); if (!amount) return;
    var orderNo = genOrderNo();
    currentOrderNo = orderNo;
    document.getElementById('qrBtn').disabled = true;
    document.getElementById('qrBtn').textContent = '生成中...';
    document.getElementById('qrLoading').classList.add('active');

    cashFetch(cashApiBase + '/aggregate/order', {
      method: 'POST',
      body: JSON.stringify({
        merchantOrderNo: orderNo,
        payAmount: parseFloat(amount),
        productSubject: getProduct()
      })
    })
    .then(function(res) {
      if (res.code === 200 && res.data) {
        currentOrderNo = res.data.orderNo;
        cashFetch(cashApiBase + '/aggregate/order/' + res.data.orderNo + '/qrcode?size=200')
          .then(function(qrRes) {
            if (qrRes.code === 200 && qrRes.data) {
              var box = document.getElementById('qrcodeBox');
              box.innerHTML = '<img src="' + qrRes.data + '" alt="收款码"/>';
              startPolling(res.data.orderNo, 'qr');
            } else {
              alert('生成二维码失败: ' + (qrRes.message || ''));
            }
          });
      } else {
        alert(res.message || '生成二维码失败');
      }
    })
    .catch(function(e) { alert('生成失败: ' + (e.message || '网络错误')); })
    .finally(function() {
      document.getElementById('qrBtn').disabled = false;
      document.getElementById('qrBtn').textContent = '生成收款码';
      document.getElementById('qrLoading').classList.remove('active');
    });
  }

  function refreshQrCode() { generateQrCode(); }

  function queryQrOrder() {
    if (!currentOrderNo) { alert('暂无订单'); return; }
    cashFetch(cashApiBase + '/aggregate/order/' + currentOrderNo)
      .then(function(res) {
        if (res.code === 200 && res.data) {
          var d = res.data;
          if (d.payStatus === 1 || 'SUCCESS' === d.payStatus) {
            stopPolling();
            showResult('success', '支付成功', '用户已完成支付', d.payAmount, {
              '订单号': d.orderNo,
              '支付渠道': d.payChannel || '-'
            });
          } else if (d.payStatus === 0 || d.payStatus == null || 'PENDING' === d.payStatus) {
            alert('等待用户支付中...');
          } else {
            alert('订单状态: ' + (d.payStatusDesc || d.payStatus));
          }
        } else {
          alert('查询失败: ' + (res.message || ''));
        }
      })
      .catch(function(e) { alert('查询异常: ' + e.message); });
  }

  function startPolling(orderNo, type) {
    stopPolling();
    var count = 0;
    var maxCount = 30;
    var url = type === 'qr' ? (cashApiBase + '/aggregate/order/' + orderNo)
          : (type === 'barcode' ? (cashApiBase + '/barcode/retry/' + orderNo)
                                : (cashApiBase + '/facepay/retry/' + orderNo));
    pollingTimer = setInterval(function() {
      count++;
      if (count > maxCount) { stopPolling(); return; }
      cashFetch(url)
        .then(function(res) {
          if (res.code === 200 && res.data) {
            var d = res.data;
            if (d.isSuccess || d.payStatus === 1 || 'SUCCESS' === d.payStatus) {
              stopPolling();
              showResult('success', '支付成功', '收款已到账', d.payAmount, {
                '订单号': d.orderNo,
                '交易号': d.channelTradeNo || '-'
              });
            } else if (d.payStatus === 2 || 'FAIL' === d.payStatus || 'PAY_FAIL' === d.code) {
              stopPolling();
              showResult('fail', '支付失败', d.subMsg || d.msg || '用户取消支付', d.payAmount);
            }
          }
        })
        .catch(function() {});
    }, 2000);
  }

  function stopPolling() {
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
  }

  function showResult(type, title, desc, amount, detail) {
    stopPolling();
    var modal = document.getElementById('resultModal');
    var icon = document.getElementById('resultIcon');
    icon.className = 'result-icon ' + type;
    icon.textContent = type === 'success' ? '✓' : (type === 'paying' ? '⏳' : '✕');
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultTitle').style.color =
      type === 'success' ? '#52c41a' : (type === 'paying' ? '#1677ff' : '#ff4d4f');
    document.getElementById('resultDesc').textContent = desc;
    document.getElementById('resultAmount').textContent = '¥' + amount;
    var detailBox = document.getElementById('resultDetail');
    if (detail) {
      var html = '';
      Object.keys(detail).forEach(function(k) {
        if (detail[k]) {
          html += '<div class="row"><span class="label">' + k + '</span><span class="value">' + detail[k] + '</span></div>';
        }
      });
      detailBox.innerHTML = html;
      detailBox.style.display = 'block';
    } else {
      detailBox.style.display = 'none';
    }

    var adBox = document.getElementById('resultAd');
    var adInner = document.getElementById('resultAdInner');
    var primaryBtn = document.getElementById('resultPrimaryBtn');
    adBox.style.display = 'none';
    adInner.innerHTML = '';

    if (type === 'success' && merchantNo) {
      primaryBtn.textContent = '查看推荐奖励';
      primaryBtn.onclick = function() {
        window.location.href = '/ad/success/' + encodeURIComponent(merchantNo)
          + '?orderNo=' + encodeURIComponent(currentOrderNo || '')
          + '&amount=' + encodeURIComponent(amount)
          + '&position=PAY_SUCCESS';
      };
      fetch('/api/ad/display?merchantNo=' + encodeURIComponent(merchantNo)
        + '&position=PAY_SUCCESS&limit=1'
        + '&orderNo=' + encodeURIComponent(currentOrderNo || '')
        + '&payAmount=' + encodeURIComponent(amount))
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res.code === 200 && res.data && res.data.length > 0) {
            var ad = res.data[0];
            adBox.style.display = 'block';
            var target = '/ad/click/redirect?adCode=' + encodeURIComponent(ad.adCode)
              + '&merchantNo=' + encodeURIComponent(merchantNo)
              + '&orderNo=' + encodeURIComponent(currentOrderNo || '')
              + '&position=PAY_SUCCESS'
              + '&payAmount=' + encodeURIComponent(amount);
            if (ad.adImageUrl && ad.adImageUrl.length > 0) {
              adInner.innerHTML =
                '<a href="' + target + '" target="_blank" class="result-ad-link" style="display:block;padding:0;">'
                + '<img src="' + ad.adImageUrl + '" alt="ad" style="width:100%;border-radius:8px;max-height:140px;object-fit:cover;display:block;"/></a>';
            } else {
              adInner.innerHTML =
                '<a href="' + target + '" target="_blank" class="result-ad-link">'
                + '<div class="result-ad-icon">🎁</div>'
                + '<div class="result-ad-text">'
                + '<div class="result-ad-title">' + (ad.adTitle || '精选推荐') + '</div>'
                + '<div class="result-ad-desc">' + (ad.adDescription || '点击查看详情') + '</div>'
                + '</div><div class="result-ad-arrow">›</div></a>';
            }
          } else {
            if (res.code === 200 && (!res.data || res.data.length === 0)) {
              adBox.style.display = 'block';
              adInner.innerHTML = '<div class="result-ad-empty">暂无广告推荐</div>';
            }
          }
        })
        .catch(function() {});
    } else {
      primaryBtn.textContent = '确认';
      primaryBtn.onclick = function() { closeModal(); };
    }

    modal.classList.add('show');
  }

  function closeModal() {
    document.getElementById('resultModal').classList.remove('show');
  }

  function resetForm() {
    closeModal();
    stopPolling();
    document.getElementById('amountInput').value = '';
    document.getElementById('authCodeInput').value = '';
    document.getElementById('openIdInput').value = '';
    lastScanCode = '';
    currentOrderNo = '';
    currentFaceCode = '';
    var box = document.getElementById('qrcodeBox');
    box.innerHTML = '<div class="qrcode-empty">点击生成收款码</div>';
    if (scanMode === 'camera') {
      var btn = document.getElementById('barcodeBtn');
      btn.textContent = '等待扫描付款码...';
      btn.disabled = true;
    }
    setTimeout(function() { document.getElementById('amountInput').focus(); }, 100);
  }

  document.getElementById('authCodeInput').addEventListener('keydown', function(e) {
    if (e.keyCode === 13) submitBarcodePay();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  document.addEventListener('visibilitychange', function() {
    if (document.hidden && scanMode === 'camera') {
      stopScanner();
    } else if (!document.hidden && currentPayMode === 'barcode' && scanMode === 'camera') {
      startScanner();
    }
  });

  initCashier();
  setTimeout(function() { document.getElementById('amountInput').focus(); }, 200);
</script>
</body>
</html>
